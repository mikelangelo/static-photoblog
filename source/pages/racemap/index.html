<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Race Track Events</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="racemap.css">
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-logo" id="brand-logo">PH</div>
    <div>
      <div class="brand-name" id="brand-name">Your Name Photography</div>
      <div class="brand-tagline">Race Track Event Map</div>
    </div>
  </div>

  <div class="hdiv"></div>

  <div class="filter-bar">
    <select class="filter-select" id="month-filter">
      <option value="">All Months</option>
    </select>

    <select class="filter-select" id="track-filter">
      <option value="">All Tracks</option>
    </select>

    <button class="toggle-pill" id="weekend-btn">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8">
        <rect x="2" y="3" width="12" height="11" rx="2"/><path d="M5 1v3M11 1v3M2 7h12"/>
      </svg>
      Weekends
    </button>

    <button class="toggle-pill" id="shoot-btn">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8">
        <circle cx="8" cy="9" r="3"/><path d="M1 6h2l1.5-2h7L13 6h2v7H1V6z"/>
      </svg>
      My Shoots
    </button>

    <button class="reset-btn" id="reset-btn">Clear filters</button>
  </div>
</header>

<div class="app-body">
  <div class="sidebar">
    <div class="sidebar-top">
      <span class="sidebar-label">Events</span>
      <span class="sidebar-count" id="event-count">0</span>
    </div>
    <div class="sidebar-scroll" id="sidebar-content"></div>
  </div>

  <div style="position:relative;flex:1;overflow:hidden;min-height:0;height:100%;">
    <div id="map"></div>
    <div class="map-legend">
      <div class="legend-row">
        <div class="legend-pin" style="background:#555"></div>Race Track
      </div>
      <div class="legend-row">
        <div class="legend-pin" style="background:var(--accent)"></div>I'm Shooting Here
      </div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ================================================================
//  DATA — loaded from events.json (must be in same folder, served via web server)
// ================================================================
let DATA = null;

// ── MAP ──────────────────────────────────────────────────────────
const map = L.map('map', { zoomControl: true }).setView([33.0, -96.2], 7);
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/attributions">CARTO</a>',
  subdomains: 'abcd', maxZoom: 19
}).addTo(map);

// ── STATE ────────────────────────────────────────────────────────
const state = { month: '', track: '', weekends: false, myShots: false };
const markerMap = {};

// ── UTILS ────────────────────────────────────────────────────────
const parseDate = s => new Date(s + 'T00:00:00');
const isWeekend = s => { const d = parseDate(s).getDay(); return d === 0 || d === 5 || d === 6; };
const monthKey  = s => s.slice(0,7);
const monthLbl  = k => { const [y,m]=k.split('-'); return new Date(+y,+m-1,1).toLocaleDateString('en-US',{month:'long',year:'numeric'}); };
const fmtMon    = s => parseDate(s).toLocaleDateString('en-US',{month:'short'}).toUpperCase();
const fmtDay    = s => parseDate(s).getDate();
const fmtDOW    = s => parseDate(s).toLocaleDateString('en-US',{weekday:'short'}).toUpperCase();
const fmtFull   = s => parseDate(s).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
const passes    = e => {
  if (state.month   && monthKey(e.date) !== state.month) return false;
  if (state.weekends && !isWeekend(e.date))               return false;
  if (state.myShots  && !e.iAmShooting)                   return false;
  return true;
};

// ── FILTERS ──────────────────────────────────────────────────────
function buildFilters() {
  const months = new Set();
  DATA.tracks.forEach(t => t.events.forEach(e => months.add(monthKey(e.date))));
  const mSel = document.getElementById('month-filter');
  [...months].sort().forEach(m => {
    const o = document.createElement('option'); o.value = m; o.textContent = monthLbl(m); mSel.appendChild(o);
  });
  const tSel = document.getElementById('track-filter');
  DATA.tracks.forEach(t => {
    const o = document.createElement('option'); o.value = t.id; o.textContent = t.name; tSel.appendChild(o);
  });
}

// ── MARKER ───────────────────────────────────────────────────────
function makeIcon(shooting) {
  const bg  = shooting ? '#FF5C00' : '#555';
  const glow = shooting ? '0 3px 12px rgba(255,92,0,0.4)' : '0 2px 8px rgba(0,0,0,0.18)';
  return L.divIcon({
    className: '',
    html: `<div style="width:30px;height:38px;position:relative;">
      <div style="width:30px;height:30px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);background:${bg};
        border:2.5px solid white;box-shadow:${glow};display:flex;align-items:center;justify-content:center;">
        <span style="transform:rotate(45deg);font-size:12px;">${shooting ? '📷' : '🏁'}</span>
      </div>
    </div>`,
    iconSize: [30, 38], iconAnchor: [15, 38], popupAnchor: [0, -40]
  });
}

// ── POPUP ────────────────────────────────────────────────────────
function makePopup(track, evs) {
  const logo = track.logo
    ? `<img src="${track.logo}" style="width:100%;height:100%;object-fit:cover;" alt="">`
    : track.initials;

  const evHTML = evs.length === 0
    ? `<div class="popup-no-evs">No events match current filters</div>`
    : evs.map(e => `
      <div class="popup-ev${e.iAmShooting?' shooting':''}">
        <div class="popup-ev-name">${e.name}</div>
        <div class="chips">
          <span class="chip chip-time">${fmtFull(e.date)} · ${e.time}</span>
          ${e.promoter!=='Track Hosted'?`<span class="chip chip-promoter">${e.promoter}</span>`:''}
          ${e.iAmShooting?`<span class="chip chip-shoot">📷 Shooting</span>`:''}
        </div>
      </div>`).join('');

  return `<div class="popup-inner">
    <div class="popup-track-hdr">
      <div class="popup-logo">${logo}</div>
      <div>
        <div class="popup-track-name">${track.name}</div>
        <div class="popup-addr">${track.address}</div>
      </div>
    </div>
    <div class="popup-evs-lbl">Upcoming Events</div>
    ${evHTML}
  </div>`;
}

// ── RENDER ───────────────────────────────────────────────────────
function render() {
  // Markers
  Object.values(markerMap).forEach(m => m.remove());
  Object.keys(markerMap).forEach(k => delete markerMap[k]);

  DATA.tracks.forEach(track => {
    if (state.track && track.id !== state.track) return;
    const evs = track.events.filter(passes).sort((a,b) => a.date.localeCompare(b.date));
    const shooting = evs.some(e => e.iAmShooting);
    const m = L.marker([track.lat, track.lng], { icon: makeIcon(shooting) })
      .addTo(map)
      .bindPopup(makePopup(track, evs), { maxWidth: 340 });
    markerMap[track.id] = m;
  });

  // Sidebar
  const container = document.getElementById('sidebar-content');
  container.innerHTML = '';
  let total = 0;

  DATA.tracks.forEach(track => {
    if (state.track && track.id !== state.track) return;
    const evs = track.events.filter(passes).sort((a,b) => a.date.localeCompare(b.date));
    if (!evs.length) return;
    total += evs.length;

    const logoContent = track.logo
      ? `<img src="${track.logo}" style="width:100%;height:100%;object-fit:cover;" alt="">`
      : `<span>${track.initials}</span>`;

    const rows = evs.map(e => `
      <div class="event-row${e.iAmShooting?' shooting':''}" data-tid="${track.id}" data-lat="${track.lat}" data-lng="${track.lng}">
        <div class="date-col">
          <div class="d-month">${fmtMon(e.date)}</div>
          <div class="d-day">${fmtDay(e.date)}</div>
          <div class="d-dow">${fmtDOW(e.date)}</div>
        </div>
        <div class="event-main">
          <div class="event-title">${e.name}</div>
          <div class="chips">
            <span class="chip chip-time">${e.time}</span>
            ${e.promoter!=='Track Hosted'?`<span class="chip chip-promoter">${e.promoter}</span>`:''}
            ${e.iAmShooting?`<span class="chip chip-shoot">📷 Shooting</span>`:''}
          </div>
          ${e.classes?`<div style="font-size:10px;color:var(--ink-3);margin-top:4px;font-family:'DM Sans',sans-serif;line-height:1.4;">${e.classes}</div>`:''}
        </div>
      </div>`).join('');

    const sec = document.createElement('div');
    sec.className = 'track-section';
    sec.innerHTML = `
      <div class="track-header" data-tid="${track.id}">
        <div class="track-logo-sm">${logoContent}</div>
        <div class="track-info"><div class="tname">${track.name}</div><div class="taddr">${track.address}</div></div>
        <span style="font-size:10px;color:var(--ink-3)">▶</span>
      </div>
      <div class="event-stack">${rows}</div>`;
    container.appendChild(sec);
  });

  if (!total) {
    container.innerHTML = `<div style="padding:32px 16px;text-align:center;color:var(--ink-3);font-style:italic;font-size:13px;">No events match your current filters.</div>`;
  }

  document.getElementById('event-count').textContent = total;

  // Interactions
  container.querySelectorAll('.track-header').forEach(el => {
    el.addEventListener('click', () => {
      const t = DATA.tracks.find(t => t.id === el.dataset.tid);
      if (!t) return;
      map.flyTo([t.lat, t.lng], 12, { duration: 0.9 });
      setTimeout(() => markerMap[t.id]?.openPopup(), 800);
    });
  });

  container.querySelectorAll('.event-row').forEach(el => {
    el.addEventListener('click', () => {
      map.flyTo([+el.dataset.lat, +el.dataset.lng], 13, { duration: 0.9 });
      setTimeout(() => markerMap[el.dataset.tid]?.openPopup(), 800);
    });
  });
}

// ── CONTROLS ─────────────────────────────────────────────────────
document.getElementById('month-filter').addEventListener('change', e => { state.month = e.target.value; render(); });
document.getElementById('track-filter').addEventListener('change', e => { state.track = e.target.value; render(); });

document.getElementById('weekend-btn').addEventListener('click', function() {
  state.weekends = !state.weekends; this.classList.toggle('on', state.weekends); render();
});

document.getElementById('shoot-btn').addEventListener('click', function() {
  state.myShots = !state.myShots; this.classList.toggle('on', state.myShots); render();
});

document.getElementById('reset-btn').addEventListener('click', () => {
  state.month = ''; state.track = ''; state.weekends = false; state.myShots = false;
  document.getElementById('month-filter').value = '';
  document.getElementById('track-filter').value = '';
  document.getElementById('weekend-btn').classList.remove('on');
  document.getElementById('shoot-btn').classList.remove('on');
  render();
});

// ── BRAND ────────────────────────────────────────────────────────
function applyBrand() {
  const ph = DATA.photographer;
  document.getElementById('brand-name').textContent = ph.name;
  if (ph.logo) {
    document.getElementById('brand-logo').innerHTML = `<img src="${ph.logo}" style="width:100%;height:100%;object-fit:cover;border-radius:8px;" alt="">`;
  } else {
    document.getElementById('brand-logo').textContent = ph.initials;
  }
}

// ── INIT ─────────────────────────────────────────────────────────
async function init() {
  // Show loading state
  document.getElementById('sidebar-content').innerHTML =
    `<div style="padding:32px 16px;text-align:center;color:var(--ink-3);font-size:13px;">Loading events…</div>`;

  try {
    const res = await fetch('racemap.json');
    if (!res.ok) throw new Error(`Could not load events.json (HTTP ${res.status})`);
    DATA = await res.json();
  } catch (err) {
    document.getElementById('sidebar-content').innerHTML =
      `<div style="padding:20px 16px;font-size:12px;color:#c00;line-height:1.6;">
        <strong>⚠ Could not load events.json</strong><br><br>
        Make sure <code>events.json</code> is in the <strong>same folder</strong> as this HTML file
        and you are accessing it through a <strong>web server</strong>
        (not by double-clicking the file — browsers block local JSON fetches for security).<br><br>
        <em>${err.message}</em>
      </div>`;
    return;
  }

  applyBrand();
  buildFilters();
  render();

  // Force Leaflet to recalculate map container size after full page render
  window.addEventListener('load', () => { map.invalidateSize(); });
  setTimeout(() => map.invalidateSize(), 100);
}

init();
</script>
</body>
</html>
